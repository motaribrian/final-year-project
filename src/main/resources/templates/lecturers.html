<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Lecturers - TUM Admin Dashboard</title>
    <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport"/>
    <link rel="icon" th:href="@{/assets/favicon.ico}" type="image/x-icon" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script th:src="@{/js/webfont/webfont.min.js}"></script>
    <script th:inline="javascript">
        var url= /*[[@{/css/fonts.min.css}]]*/ '/css/fonts.min.css';
        WebFont.load({
            google: { families: ["Public Sans:300,400,500,600,700"] },
            custom: {
                families: [
                    "Font Awesome 5 Solid",
                    "Font Awesome 5 Regular",
                    "Font Awesome 5 Brands",
                    "simple-line-icons",
                ],
                urls: [url],
            },
            active: function () {
                sessionStorage.fonts = true;
            },
        });
    </script>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/plugins.min.css}" />
    <link rel="stylesheet" th:href="@{/css/kaiadmin.min.css}" />
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('lecturers')}"></div>
    <div class="main-panel">
        <div th:replace="fragments/header :: header"></div>
        <div class="container">
            <div class="page-inner">
                <div class="page-header d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
                    <h4 class="page-title m-0">Manage Lecturers</h4>
                    <ul class="breadcrumbs m-0">
                        <li class="nav-home">
                            <a th:href="@{/}"><i class="icon-home"></i></a>
                        </li>
                        <li class="separator"><i class="icon-arrow-right"></i></li>
                        <li class="nav-item">
                            <a href="#">Lecturers</a>
                        </li>
                    </ul>
                </div>

                <div class="row">
                    <div class="col-sm-6 col-md-4">
                        <div class="card card-stats card-round">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-icon">
                                        <div class="icon-big text-center icon-primary bubble-shadow-small">
                                            <i class="fas fa-users"></i>
                                        </div>
                                    </div>
                                    <div class="col col-stats ms-3 ms-sm-0">
                                        <div class="numbers">
                                            <p class="card-category">Total Lecturers</p>
                                            <h4 class="card-title" th:text="${teachers != null ? teachers.size() : 0}">0</h4>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-md-4">
                        <div class="card card-stats card-round">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-icon">
                                        <div class="icon-big text-center icon-success bubble-shadow-small">
                                            <i class="fas fa-book"></i>
                                        </div>
                                    </div>
                                    <div class="col col-stats ms-3 ms-sm-0">
                                        <div class="numbers">
                                            <p class="card-category">Active Departments</p>
                                            <h4 class="card-title">4</h4>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-md-4">
                        <div class="card card-stats card-round">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-icon">
                                        <div class="icon-big text-center icon-secondary bubble-shadow-small">
                                            <i class="fas fa-calendar-check"></i>
                                        </div>
                                    </div>
                                    <div class="col col-stats ms-3 ms-sm-0">
                                        <div class="numbers">
                                            <p class="card-category">Lessons Assigned</p>
                                            <h4 class="card-title">124</h4>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h4 class="card-title m-0">Lecturer Directory</h4>
                                <a th:href="@{/lecturers/save}" class="btn btn-primary btn-round">
                                    <i class="fa fa-plus me-1"></i> Add Lecturer
                                </a>
<!--                                <button class="btn btn-primary btn-round" data-bs-toggle="modal" data-bs-target="#addLecturerModal">-->
<!--                                    <i class="fa fa-plus me-1"></i> Add Lecturer-->
<!--                                </button>-->
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table id="lecturer-datatables" class="table table-striped table-hover table-bordered w-100">
                                        <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>First Name</th>
                                            <th>Last Name</th>
                                            <th>Email</th>
                                            <th class="text-center">Action</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="teacher : ${teachers}">
                                            <td th:text="${teacher.id}">1</td>
                                            <td th:text="${teacher.firstNAme}">John</td>
                                            <td th:text="${teacher.lastName}">Doe</td>
                                            <td th:text="${teacher.userAccount != null ? teacher.userAccount.userName : 'No Email'}">johndoe@university.edu</td>
                                            <td class="text-center">
                                                <div class="form-button-action">
                                                    <a th:href="@{/lecturers/{id}/page(id=${teacher.id})}" class="btn btn-link btn-primary btn-lg" title="View Profile">
                                                        <i class="fa fa-eye"></i>
                                                    </a>
                                                    <button type="button" class="btn btn-link btn-info btn-lg" title="Edit Task">
                                                        <i class="fa fa-edit"></i>
                                                    </button>
                                                    <button type="button" class="btn btn-link btn-danger" title="Remove">
                                                        <i class="fa fa-times"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </div>
</div>


<script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script th:src="@{/js/popper.min.js}"></script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>

<script th:src="@{/js/jquery-scrollbar/jquery.scrollbar.min.js}"></script>
<script th:src="@{/js/datatables/datatables.min.js}"></script>
<script th:src="@{/js/sweetalert/sweetalert.min.js}"></script>

<script th:src="@{/js/kaiadmin.min.js}"></script>
<script th:src="@{/js/app2.js}"></script>

<script>
    $(document).ready(function () {
        $("#lecturer-datatables").DataTable({
            pageLength: 10,
            language: {
                search: "Search Lecturers:",
            }
        });
    });
</script>
</body>
</html>
