<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Technical University of Mombasa</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f5f8; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .wrapper-login { width: 100%; max-width: 400px; padding: 15px; }
        .card-login { border: none; border-radius: 10px; box-shadow: 0 4px 20px 0 rgba(0,0,0,0.05); }
        .brand-text { color: #1a2035; font-weight: 700; }
    </style>
</head>
<body>

<div class="wrapper-login">
    <div class="card card-login p-4">
        <div class="text-center mb-4">
            <h3 class="brand-text">TUM Timetable</h3>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <form th:action="@{/login}" method="POST" th:object="${authdto}">
            <div class="mb-3">
                <label for="username" class="form-label fw-bold">Username / Registration No.</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                    <input type="email" class="form-control border-start-0" id="username" th:field="*{email}" placeholder="Enter username" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <a href="#" class="text-decoration-none small">Forgot Password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" th:field="*{password}" placeholder="Enter password" required>
                </div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Don't have an account?</span>
            <a th:href="@{/auth/sign-up}" class="text-decoration-none fw-bold">Sign Up</a>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
