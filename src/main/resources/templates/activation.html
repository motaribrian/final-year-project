<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Account - Technical University of Mombasa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f5f8; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .wrapper-activate { width: 100%; max-width: 450px; padding: 15px; }
        .card-activate { border: none; border-radius: 10px; box-shadow: 0 4px 20px 0 rgba(0,0,0,0.05); text-align: center; }
        .icon-circle { width: 80px; height: 80px; background-color: #e8f5e9; color: #2e7d32; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
    </style>
</head>
<body>

<div class="wrapper-activate">
    <div class="card card-activate p-5">
        <div class="icon-circle">
            <i class="fas fa-envelope-open-text"></i>
        </div>

        <h3 class="fw-bold text-dark mb-3">Verify Your Email</h3>
        <p class="text-muted mb-4">
            We've sent a 6-digit activation code to your university email address. Please enter it below to activate your account.
        </p>

        <form action="login.html" method="POST">
            <div class="mb-4">
                <input type="text" class="form-control form-control-lg text-center fw-bold text-primary" id="activationCode" placeholder="000000" maxlength="6" style="letter-spacing: 5px; font-size: 24px;" required>
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-3">Verify & Activate</button>
        </form>

        <div class="mt-2">
            <span class="text-muted small">Didn't receive the email?</span>
            <button class="btn btn-link btn-sm text-decoration-none fw-bold p-0 ms-1">Resend Code</button>
        </div>

        <div class="mt-4 pt-3 border-top">
            <a href="login.html" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
