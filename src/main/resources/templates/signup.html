<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuric-SignUp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link id="mainStyle" rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<div class="page-content d-flex align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6 col-xxl-5">
            <div class="auth-card">

                <div class="logo-area">
                    <img id="header_logo" class="logo" th:src="@{/assets/logo.png}" alt="Logo"/>
                </div>

                <h5 class="auth-title">Coding.Tuturials.Software</h5>

                <button class="btn service-btn mt-5 mb-3">
                    <i class="fab fa-google service-icon"></i>
                    Register ith Google
                </button>

                <button class="btn service-btn mb-3">
                    <i class="fab fa-github service-icon"></i>
                    Registrieren mit Github
                </button>

                <hr class="separator">

                <form id="registrationForm" th:action="@{/auth/sign-up}" method="POST" th:object="${authdto}">

                    <div class="step" id="step1">
                        <h5 class="mb-3">Personal Details</h5>
                        <div class="mb-3">
                            <input type="text" name="firstName" class="form-control auth-input" placeholder="First Name" th:field="*{firstName}" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" name="lastName" class="form-control auth-input" placeholder="Last Name" th:field="*{lastName}" required>
                        </div>
                        <button type="button" class="btn auth-btn mt-2" onclick="nextStep(1, 2)">Next</button>
                    </div>

                    <div class="step d-none" id="step2">
                        <h5 class="mb-3">Account Security</h5>
                        <div class="mb-2">
                            <input type="email" name="userName" class="form-control auth-input" placeholder="Username" th:field="*{email}" required>
                        </div>
                        <div class="mb-2">
                            <input type="password" name="password" class="form-control auth-input" placeholder="Password" th:field="*{password}" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control auth-input" placeholder="Repeat Password" th:field="*{repeatPassword}" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary mt-2 w-50" onclick="nextStep(0, 1)">Back</button>
                            <button type="button" class="btn auth-btn mt-2 w-50" onclick="nextStep(2, 3)">Next</button>
                        </div>
                    </div>

                    <div class="step d-none" id="step3">
                        <h5 class="mb-3">Assign Roles</h5>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="userRoles" value="TEACHER" id="roleTeacher">
                            <label class="form-check-label" for="roleTeacher">Teacher</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="userRoles" value="STUDENT" id="roleStudent">
                            <label class="form-check-label" for="roleStudent">Student</label>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" name="userRoles" value="ADMIN" id="roleAdmin">
                            <label class="form-check-label" for="roleAdmin">Admin</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary mt-2 w-50" onclick="nextStep(0, 2)">Back</button>
                            <button type="submit" class="btn auth-btn mt-2 w-50">Register</button>
                        </div>
                    </div>
                </form>

                <p class="text mt-4 mb-4 text-center">Bereits einen Account? <a href="login.html" class="text-link">Zum Login</a></p>

            </div>
        </div>
    </div>
</div>

<button id="theme_button" class="btn btn-theme" onclick="onThemeChange()">
    <i id="theme_icon" class="fas fa-moon"></i>
</button>

<script type="text/javascript">
    function onThemeChange() {
        let cssStyleSheet = document.getElementById("mainStyle");
        let path = (cssStyleSheet.href).substring((cssStyleSheet.href).length-9, (cssStyleSheet.href).length);
        if(path === "style.css") {
            cssStyleSheet.href = "css/style_dark.css";
            document.getElementById("header_logo").src = "assets/logo_dark.png";
            document.getElementById("theme_icon").className = "fas fa-sun";
        } else {
            cssStyleSheet.href = "assets/css/style.css";
            document.getElementById("header_logo").src = "assets/img/logo.png";
            document.getElementById("theme_icon").className = "fas fa-moon";
        }
    }
</script>

<script>
    function nextStep(currentStep, targetStep) {
        // If moving forward, validate the current step first
        if (currentStep > 0) {
            const currentDiv = document.getElementById('step' + currentStep);
            const inputs = currentDiv.querySelectorAll('input[required]');
            let isValid = true;

            for (let input of inputs) {
                if (!input.checkValidity()) {
                    input.reportValidity(); // This triggers the browser's native warning tooltip
                    isValid = false;
                    break;
                }
            }

            if (!isValid) return; // Stop if validation fails
        }

        // Hide all steps
        document.querySelectorAll('.step').forEach(step => {
            step.classList.add('d-none');
        });

        // Show target step
        document.getElementById('step' + targetStep).classList.remove('d-none');
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

</body>
</html>
