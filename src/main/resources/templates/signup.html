<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Technical University of Mombasa</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f5f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px 0; }
        .wrapper-signup { width: 100%; max-width: 500px; padding: 15px; }
        .card-signup { border: none; border-radius: 10px; box-shadow: 0 4px 20px 0 rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="wrapper-signup">
    <div class="card card-signup p-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Create Account</h3>
            <p class="text-muted">Register for the Timetable Portal</p>
        </div>

        <form th:action="@{/auth/sign-up}" method="POST" th:object="${authdto}">
            <div class="mb-3">
                <label class="form-label fw-bold">I am a...</label>
                <select class="form-select" id="role" name="userRoles" required>
                    <option value="" disabled selected>Select your role</option>
                    <option th:value="${T(com.codewithmotari.collegetimetabling.domain.ROLE).STUDENT}">Student</option>
                    <option th:value="${T(com.codewithmotari.collegetimetabling.domain.ROLE).TEACHER}">Lecturer</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="fullname" class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control" id="fullname" placeholder="John Doe" th:field="*{firstName}" required>
            </div>

            <div class="mb-3">
                <label for="regno" class="form-label fw-bold">Registration No. / Staff ID</label>
                <input type="text" class="form-control" id="regno" placeholder="e.g., BSCS/2023/001" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-bold">University Email</label>
                <input type="email" class="form-control" id="email" placeholder="student@tum.ac.ke" th:field="*{email}" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-bold">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create a strong password" th:field="*{password}" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Create Account</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Already have an account?</span>
            <a th:href="@{/auth/login}" class="text-decoration-none fw-bold">Sign In</a>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
