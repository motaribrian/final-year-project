<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />

    <meta th:if="${isSolving}" http-equiv="refresh" content="2">

    <title>Automated Timetable Generator - Final Year Project</title>
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/webjars/font-awesome/css/all.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<header class="header">
    <img alt="University Logo" src="assets/logo.png" />
    <div class="header-right">
        <a class="name" href="https://www.tum.ac.ke/">&nbsp; Technical University of Mombasa &nbsp;</a>
    </div>
</header>
<div class="container">
    <h1>Automated University Timetable Generator</h1>
    <p>Generate the optimal schedule for lecturers, rooms, and student groups.</p>

    <div class="d-flex align-items-center mb-2">
        <form th:action="@{/}" method="get" class="mr-2">
            <button class="btn btn-secondary" type="submit"><span class="fas fa-refresh"></span> Refresh</button>
        </form>

        <form th:if="${!isSolving}" th:action="@{/solve}" method="post" class="mr-2">
            <button class="btn btn-success" type="submit"><span class="fas fa-play"></span> Solve</button>
        </form>

        <form th:if="${isSolving}" th:action="@{/stopSolving}" method="post" class="mr-2">
            <button class="btn btn-danger" type="submit"><span class="fas fa-stop"></span> Stop solving</button>
        </form>

        <span class="score ml-2 align-middle font-weight-bold" th:text="'Score: ' + (${timeTable.score != null ? timeTable.score : '?'})"></span>
    </div>

    <div class="tab-content mt-4">
        <div class="tab-pane fade show active" id="byRoomPanel">
            <table class="table table-bordered table-striped" id="timeTableByRoom">
                <thead class="thead-dark">
                <tr>
                    <th>Timeslot</th>
                    <th th:each="room : ${timeTable.roomList}">
                        <span th:text="${room.name}"></span>
                        <form th:action="@{/rooms/delete/{id}(id=${room.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-light btn-sm p-1 ml-2"><small class="fas fa-trash"></small></button>
                        </form>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="timeslot : ${timeTable.timeslotList}">
                    <th class="align-middle">
                        <span th:text="${timeslot.dayOfWeek + ' ' + timeslot.startTime + ' - ' + timeslot.endTime}"></span>
                        <form th:action="@{/timeslots/delete/{id}(id=${timeslot.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-light btn-sm p-1 ml-2"><small class="fas fa-trash"></small></button>
                        </form>
                    </th>
                    <td th:each="room : ${timeTable.roomList}">
                        <th:block th:each="lesson : ${timeTable.lessonList}">
                            <div th:if="${lesson.timeslot != null and lesson.room != null and lesson.timeslot.id == timeslot.id and lesson.room.id == room.id}"
                                 class="card lesson mb-1" th:style="'background-color: ' + ${subjectColors[lesson.subject]}">
                                <div class="card-body p-2">
                                    <form th:action="@{/lessons/delete/{id}(id=${lesson.id})}" method="post" class="float-right d-inline">
                                        <button type="submit" class="btn btn-light btn-sm p-1"><small class="fas fa-trash"></small></button>
                                    </form>
                                    <h5 class="card-title mb-1" th:text="${lesson.subject}"></h5>
                                    <p class="card-text ml-2 mb-1"><em th:text="'by ' + ${lesson.teacher}"></em></p>
                                    <p class="card-text ml-2 mb-0" th:text="${lesson.studentGroup}"></p>
                                    <small class="card-text text-muted float-right" th:text="${lesson.id}"></small>
                                </div>
                            </div>
                        </th:block>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <button class="btn btn-primary" data-target="#lessonDialog" data-toggle="modal" type="button"><span class="fas fa-plus"></span> Add lesson</button>
        <button class="btn btn-secondary" data-target="#timeslotDialog" data-toggle="modal" type="button"><span class="fas fa-plus"></span> Add timeslot</button>
        <button class="btn btn-secondary" data-target="#roomDialog" data-toggle="modal" type="button"><span class="fas fa-plus"></span> Add room</button>
    </div>

    <h2 style="margin-top: 2rem">Unassigned lessons</h2>
    <div class="card-columns">
        <th:block th:each="lesson : ${timeTable.lessonList}">
            <div th:if="${lesson.timeslot == null or lesson.room == null}" class="card lesson" th:style="'background-color: ' + ${subjectColors[lesson.subject]}">
                <div class="card-body p-2">
                    <form th:action="@{/lessons/delete/{id}(id=${lesson.id})}" method="post" class="float-right d-inline">
                        <button type="submit" class="btn btn-light btn-sm p-1"><small class="fas fa-trash"></small></button>
                    </form>
                    <h5 class="card-title mb-1" th:text="${lesson.subject}"></h5>
                    <p class="card-text ml-2 mb-1"><em th:text="'by ' + ${lesson.teacher}"></em></p>
                    <p class="card-text ml-2 mb-0" th:text="${lesson.studentGroup}"></p>
                </div>
            </div>
        </th:block>
    </div>
</div>

<div class="modal fade" id="lessonDialog" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/lessons}" method="post">
                <div class="modal-header">
                    <h4>Add a lesson</h4>
                    <button class="close" data-dismiss="modal" type="button"><span>&times;</span></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Subject</label>
                        <input class="form-control" name="subject" required type="text" />
                    </div>
                    <div class="form-group">
                        <label>Lecturer</label>
                        <input class="form-control" name="teacher" required type="text" />
                    </div>
                    <div class="form-group">
                        <label>Student group</label>
                        <input class="form-control" name="studentGroup" required type="text" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-default" data-dismiss="modal" type="button">Cancel</button>
                    <button class="btn btn-primary" type="submit">Submit new lesson</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer>
    <br />
    <p>Developed By: Motari Brian &copy; 2026<br /></p>
</footer>

<script src="/webjars/jquery/jquery.min.js"></script>
<script src="/webjars/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
